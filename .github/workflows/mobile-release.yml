name: "Mobile DevSecOps - Automated Store Releases"

on:
  push:
    # Desencadenador exclusivo vía Tags Versionados
    tags:
      - 'v*.*.*'

env:
  FLUTTER_VERSION: '3.19.0'
  WORKING_DIR: frontend/mobile-app

jobs:
  # =========================================================
  # ANDROID BUILD & PLAY STORE DEPLOY (APPBUNDLE)
  # =========================================================
  build_android:
    name: "Android: Formatear, Compilar y Play Store"
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java / JVM
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Enlazar Engine de Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Sincronizar Dependencias
        run: flutter pub get

      # ---> SecOps: Decodificar y restaurar el Keystore.jks sin integrarlo al Repositorio
      - name: Inyectar Secure Keystore Android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/key
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/key/upload-keystore.jks
          
          # Autogeneramos el archivo local que Flutter leerá en el gradle build
          echo "storePassword=${{ secrets.ANDROID_KEY_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=key/upload-keystore.jks" >> android/key.properties

      - name: Compilar Android AppBundle Nativo (Signed)
        run: flutter build appbundle --release

      # ---> CD: Acción directa que automatiza la Google Play API para test interno
      - name: Transmitir (Fastlane Upload) a Google Play Internal Track 
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.sentinai.mobile
          releaseFiles: ${{ env.WORKING_DIR }}/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  # =========================================================
  # IOS BUILD & TESTFLIGHT DEPLOY (IPA)
  # =========================================================
  build_ios:
    name: "iOS: Build y Xcode TestFlight"
    # Requisito obligatorio usar Instancia Virtual Mac OS
    runs-on: macos-latest
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enlazar Engine de Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Sincronizar Dependencias
        run: flutter pub get

      # ---> SecOps: Emular Llavero local instalando Certificados Apple en Mac
      - name: Configurar Permisos y Perfiles de Aprovisionamiento (Apple)
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 1. Creamos Llavero Temporal
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # 2. Importar P12 (Certificado Distributivo)
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # 3. Empotrar Mobile Provisioning
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Compilar iOS IPA Distributivo (Signed)
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      # ---> CD: Fastlane/Transporter via Apple Account API Key
      - name: Transmitir a App Store Connect (TestFlight)
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ env.WORKING_DIR }}/build/ios/ipa/SentinAI.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
