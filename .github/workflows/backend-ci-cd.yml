name: "Backend CI/CD - Microservices Pipeline"

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  # =========================================================
  # CI JOB: Testing Continuo por Microservicio (Políglota)
  # =========================================================
  backend_ci:
    name: "Test CI | ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    
    # Estrategia de Matrices para aislar microservicios iterativamente
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: core-api
            path: backend/core-api
            lang: node
          - name: iot-ingestion
            path: backend/iot-ingestion
            lang: node
          - name: cognitive-agents
            path: backend/cognitive-agents
            lang: python
          # Ejemplo para escalar con Golang:
          # - name: stream-processor
          #   path: backend/stream-processor
          #   lang: go

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------- Setup & Testing Node.js (NestJS) ----------
      - name: Setup Node.js Config
        if: matrix.service.lang == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Test (Node)
        if: matrix.service.lang == 'node'
        working-directory: ${{ matrix.service.path }}
        run: |
          npm install
          npm run test --if-present

      # ---------- Setup & Testing Golang ----------
      - name: Setup Go Config
        if: matrix.service.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install & Test (Go)
        if: matrix.service.lang == 'go'
        working-directory: ${{ matrix.service.path }}
        run: go test ./... -v

      # ---------- Setup & Testing Python (Agents) ----------
      - name: Setup Python Config
        if: matrix.service.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install & Test (Python)
        if: matrix.service.lang == 'python'
        working-directory: ${{ matrix.service.path }}
        run: |
          pip install -r requirements.txt
          pip install pytest
          pytest

  # =========================================================
  # CD JOB: Build & Push de Imágenes Docker
  # =========================================================
  backend_cd:
    name: "Build & Push | ${{ matrix.service.name }}"
    needs: backend_ci
    # Solo se ejecuta en Merge/Push a MAIN, nunca en PRs de ramas expuestas
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: core-api
            path: backend/core-api
          - name: iot-ingestion
            path: backend/iot-ingestion
          - name: cognitive-agents
            path: backend/cognitive-agents

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Target Commit Short-SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Auth to Container Registry
        uses: docker/login-action@v3
        with:
          # Credentials defined via Repository Secrets
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/sentinai/${{ matrix.service.name }}:${{ steps.vars.outputs.sha_short }}
            ${{ secrets.REGISTRY_URL }}/sentinai/${{ matrix.service.name }}:latest

  # =========================================================
  # DEPLOY JOB: Despliegue Estricto a Kubernetes (EKS/GKE/AKS)
  # =========================================================
  backend_deploy:
    name: "Deploy K8s | ${{ matrix.service.name }}"
    needs: backend_cd
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: core-api
          - name: iot-ingestion
          - name: cognitive-agents

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Target Commit Short-SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Load Secret Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # Rolling Update usando kubectl contra el Deploy de Kubernetes
      - name: Execute Rolling Update en Clúster
        run: |
          kubectl set image deployment/${{ matrix.service.name }} \
            ${{ matrix.service.name }}=${{ secrets.REGISTRY_URL }}/sentinai/${{ matrix.service.name }}:${{ steps.vars.outputs.sha_short }} \
            -n sentinai-prod
          
          # Verificar pasivamente que los Pods se recuperen exitosamente
          kubectl rollout status deployment/${{ matrix.service.name }} -n sentinai-prod --timeout=90s
